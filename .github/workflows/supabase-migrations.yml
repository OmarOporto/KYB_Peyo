name: Supabase migrations (prod)

# Aplica las migraciones pendientes de supabase/migrations/ a la base de
# producción. Vercel despliega la app pero NO la base: sin esto, una columna
# nueva no existe en prod aunque el código que la usa ya esté desplegado.
on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch: {} # permite dispararlo manualmente desde la pestaña Actions

concurrency:
  group: supabase-db-push
  cancel-in-progress: false

jobs:
  db-push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link al proyecto de producción
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Aplicar migraciones pendientes
        run: supabase db push
